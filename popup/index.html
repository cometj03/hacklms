<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', sans-serif;
      color: #333;
    }
    h3 { margin: 0 0 15px 0; font-size: 16px; }
    
    /* 1. 메인 컨텐츠 */
    #mainContent { display: block; }
    .progress-container { margin-bottom: 20px; }
    .status-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
    .bar-bg { width: 100%; height: 10px; background-color: #eee; border-radius: 5px; }
    .bar-fill { width: 0%; height: 100%; background-color: #4CAF50; border-radius: 5px; transition: width 0.3s; }
    
    button {
      width: 100%; padding: 10px; background-color: #4CAF50; color: white;
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
    }
    button:hover { background-color: #45a049; }

    /* 2. 에러 화면 */
    #errorContent {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .error-msg {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h3>Hack LMS</h3>
  <!-- TODO: 감지된 비디오 정보 출력하기 -->
  <div id="mainContent">
    <div class="status-label">
      <span>학습 진도</span>
      <span id="completionStatus" style="font-size: 11px; padding: 2px 6px; border-radius: 10px; background: #eee; color: #666;">확인 중...</span>
    </div>
    <div class="progress-container">
      <div class="status-label">
        <span>학습 진행 상태</span>
        <b id="percentText">0%</b>
      </div>
      <div class="bar-bg">
        <div id="progressBar" class="bar-fill"></div>
      </div>
    </div>
    <button id="completeBtn">학습 완료시키기</button>
    <!-- <button id="downloadBtn">비디오 다운로드</button> -->
  </div>

  <div id="errorContent">
    <div class="error-msg">비디오 강의를 감지하지 못했습니다.</div>
  </div>

  <script src="index.js"></script>
</body>
</html>
